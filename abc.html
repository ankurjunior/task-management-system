                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <div class="value">${stats.totalUsers}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Tasks</h3>
                        <div class="value">${stats.totalTasks}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Active Tasks</h3>
                        <div class="value">${stats.activeTasks}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Completed Tasks</h3>
                        <div class="value">${stats.completedTasks}</div>
                        <div class="trend up">${stats.totalTasks ? Math.round(stats.completedTasks / stats.totalTasks * 100) : 0}% completion rate</div>
                    </div>
                    <div class="stat-card">
                        <h3>Overdue Tasks</h3>
                        <div class="value" style="color: var(--danger)">${stats.overdueTasks}</div>
                    </div>
                </div>
                
                <div class="report-section">
                    <h3>Tasks Distribution by User</h3>
                    <div class="bar-chart">
                        ${tasksPerUser.slice(0, 6).map(u => `
                            <div class="bar-item">
                                <div class="bar-value">${u.count}</div>
                                <div class="bar" style="height: ${(u.count / maxUserTasks) * 100}px;"></div>
                                <div class="bar-label">${u.name.split(' ')[0]}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="report-section">
                    <h3>Recent Activity</h3>
                    <div class="task-list" style="box-shadow: none;">
                        ${allTasks.slice(-10).reverse().map(task => {
                            const owner = db.users.find(u => u.id === task.ownerId);
                            return `
                                <div class="task-item" onclick="openTaskDetail('${task.id}')">
                                    <div class="task-item-header">
                                        <div class="task-title">${task.title}</div>
                                        <span class="status-badge status-${task.status}">${formatStatus(task.status)}</span>
                                    </div>
                                    <div class="task-meta">
                                        <span>👤 ${owner?.name || 'Unknown'}</span>
                                        <span>📅 ${formatDate(task.createdAt)}</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        
        function formatStatus(status) {
            const labels = {
                'not-started': 'Not Started',
                'in-progress': 'In Progress',
                'complete': 'Complete'
            };
            return labels[status] || status;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'error' ? 'var(--danger)' : 'var(--gray-800)';
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Close modals when clicking overlay
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
        
        // Initialize app on load
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
